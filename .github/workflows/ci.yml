name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Elixir ${{ matrix.elixir }} / OTP ${{ matrix.otp }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Elixir 1.14 supports OTP 23–26
          - { elixir: "1.14", otp: "23", os: "ubuntu-22.04" }
          - { elixir: "1.14", otp: "24", os: "ubuntu-22.04" }
          - { elixir: "1.14", otp: "25", os: "ubuntu-22.04" }
          - { elixir: "1.14", otp: "26", os: "ubuntu-22.04" }
          # Elixir 1.15 supports OTP 24–26
          - { elixir: "1.15", otp: "24", os: "ubuntu-22.04" }
          - { elixir: "1.15", otp: "25", os: "ubuntu-22.04" }
          - { elixir: "1.15", otp: "26", os: "ubuntu-22.04" }
          # Elixir 1.16 supports OTP 24–26
          - { elixir: "1.16", otp: "24", os: "ubuntu-22.04" }
          - { elixir: "1.16", otp: "25", os: "ubuntu-22.04" }
          - { elixir: "1.16", otp: "26", os: "ubuntu-22.04" }
          # Elixir 1.17 supports OTP 25–27
          - { elixir: "1.17", otp: "25", os: "ubuntu-22.04" }
          - { elixir: "1.17", otp: "26", os: "ubuntu-22.04" }
          - { elixir: "1.17", otp: "27", os: "ubuntu-24.04" }
          # Elixir 1.18 supports OTP 25–27
          - { elixir: "1.18", otp: "25", os: "ubuntu-22.04" }
          - { elixir: "1.18", otp: "26", os: "ubuntu-22.04" }
          - { elixir: "1.18", otp: "27", os: "ubuntu-24.04" }
          - { elixir: "1.18", otp: "28", os: "ubuntu-24.04" }
          # Elixir 1.19 supports OTP 26–28
          - { elixir: "1.19", otp: "26", os: "ubuntu-22.04" }
          - { elixir: "1.19", otp: "27", os: "ubuntu-24.04" }
          - { elixir: "1.19", otp: "28", os: "ubuntu-24.04" }
          # Elixir 1.20 supports OTP 27–29
          - { elixir: "1.20", otp: "27", os: "ubuntu-24.04" }
          - { elixir: "1.20", otp: "28", os: "ubuntu-24.04" }
          - { elixir: "1.20", otp: "29", os: "ubuntu-24.04" }

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir and OTP
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: build-${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            build-${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Run tests
        run: mix test

      - name: Cache dialyzer PLT
        id: plt-cache
        uses: actions/cache@v4
        with:
          path: priv/plts
          key: plt-${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            plt-${{ runner.os }}-otp${{ matrix.otp }}-elixir${{ matrix.elixir }}-

      - name: Build PLT
        if: steps.plt-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p priv/plts
          mix dialyzer --plt

      - name: Run dialyzer
        run: mix dialyzer --format short
